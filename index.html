<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: snow;
      overflow: hidden;
    }

    .border-accent {
      position: fixed;
      border: 6px solid #ba5908;
      width: 100%;
      height: 100%;
      pointer-events: none;
      box-sizing: border-box;
    }

    

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    button {
      background-color: #ba5908;
      color: white;
      border: none;
      padding: 12px 25px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    input {
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    #countdown, #videoSection, #endMessage, #tapStart, #loginSection {
      display: none;
    }

    video {
      max-width: 100%;
      max-height: 100vh;
      border-radius: 10px;
    }

    #videoSection {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: black;
}

    /* Curtains */
  .curtain {
  position: fixed;
  top: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(to bottom, #ba5908, #8c3f05);
  z-index: 100;
  transition: transform 1.8s ease-in-out;
  will-change: transform;
  display: none;
}

.left {
  left: 0;
}

.right {
  right: 0;
}

.left.open {
  transform: translateX(-100%);
}

.right.open {
  transform: translateX(100%);
}
    
    /* Orientation lock message */
    #rotateWarning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 999;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      font-size: 20px;
      color: #ba5908;
    }

  </style>
</head>
<body>

<div id="loading">Preparing your surprise...</div>
<div id="rotateWarning">Rotate your device for the best experience</div>
<div class="border-accent"></div>
  
<div class="curtain left"></div>
<div class="curtain right"></div>

<!-- Tap to start (fixes mobile autoplay restrictions) -->
<div class="container" id="tapStart">
  <h2>Tap to Begin</h2>
  <button onclick="enableAudio()">Start</button>
</div>

<div class="container" id="loginSection">
  <h2>Enter Password</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="checkPassword()">Enter</button>
</div>

<div class="container" id="countdown">
  <h2 id="countText">Best viewed horizontally<br>5</h2>
</div>

<div class="container" id="videoSection" style="background:black;">
  <video 
    id="video" 
    playsinline  
    autoplay 
    style="width:100%; height:auto;"
  >
    <source src="https://res.cloudinary.com/dxh9u4ewq/video/upload/v1777441267/0001_1_bwqo1y.mp4" type="video/mp4">
  </video>

  <p style="color:white;">
    If you can read this, the video failed to play.
  </p>
</div>
  
<div class="container" id="endMessage">
  <h2>You may exit at your convenience</h2>
</div>

<audio id="endMusic">
  <source src="Fast.mp3.mp3" type="audio/mpeg">
</audio>

<script>
  const correctPassword = "2007"; // CHANGE THIS

  function handleOrientation() {
  const rotateWarning = document.getElementById('rotateWarning');

  if (window.innerHeight > window.innerWidth) {
    rotateWarning.style.display = 'flex';
  } else {
    rotateWarning.style.display = 'none';
  }
}

window.addEventListener('resize', handleOrientation);
window.addEventListener('orientationchange', handleOrientation);

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('tapStart').style.display = 'flex';

    handleOrientation();
  }, 1500);
});
  
  function enableAudio() {
  const video = document.getElementById('video');

  // unlock audio on mobile
  video.muted = false;

  document.getElementById('tapStart').style.display = 'none';
  document.getElementById('loginSection').style.display = 'flex';
}

  function checkPassword() {
    const input = document.getElementById('password').value;
    if (input === correctPassword) {
      document.getElementById('loginSection').style.display = 'none';
      startCountdown();
    } else {
      alert('Wrong password');
    }
  }

  function startCountdown() {
    const countdownDiv = document.getElementById('countdown');
    const text = document.getElementById('countText');
    countdownDiv.style.display = 'flex';

    let count = 5;
    const interval = setInterval(() => {
      text.innerHTML = 'Best viewed horizontally<br>' + count;
      count--;

      if (count < 0) {
        clearInterval(interval);
        countdownDiv.style.display = 'none';
        openCurtains();
      }
    }, 1000);
  }

  function openCurtains() {
  const video = document.getElementById('video');
  const videoSection = document.getElementById('videoSection');

  document.querySelector('.left').style.display = 'block';
  document.querySelector('.right').style.display = 'block';

  videoSection.style.display = 'flex';

  video.play().catch(err => {
    console.log("Playback failed:", err);
  });

  requestAnimationFrame(() => {
    document.querySelector('.left').classList.add('open');
    document.querySelector('.right').classList.add('open');
  });

  video.onended = () => {
    closeCurtains();
  };
}
  function closeCurtains() {
  const leftCurtain = document.querySelector('.left');
  const rightCurtain = document.querySelector('.right');
  const videoSection = document.getElementById('videoSection');
  const endMessage = document.getElementById('endMessage');
  const video = document.getElementById('video');

  // stop showing last paused frame
  video.pause();
  video.currentTime = 0;

  // close curtains smoothly
  leftCurtain.classList.remove('open');
  rightCurtain.classList.remove('open');

  // wait for curtain animation to finish
  setTimeout(() => {

    // hide video completely
    videoSection.style.display = 'none';

    // hide curtains after closing
    leftCurtain.style.display = 'none';
    rightCurtain.style.display = 'none';

    // show final message
    endMessage.style.display = 'flex';

    // start ending music
    playMusicFadeIn();

  }, 1800);
}
  function playMusicFadeIn() {
    const audio = document.getElementById('endMusic');
    audio.volume = 0;
    audio.play().catch(err => {
  console.log("Audio blocked:", err);
});

    let vol = 0;
    const fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.02;
        audio.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  }
</script>

</body>
</html>
